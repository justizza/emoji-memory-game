<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Memory Game</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Fredoka',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffb6d9;
padding:20px;
overflow:hidden;
}

.white-box{
width:95%;
max-width:560px;
max-height:90vh;
background:white;
border-radius:25px;
padding:18px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
display:flex;
flex-direction:column;
overflow:hidden;
}

h1{
color:#ff4f9a;
font-size:1.8rem;
margin-bottom:15px;
}

.lock-icon{
font-size:65px;
margin-bottom:15px;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

.password-screen h2{
color:#ff4f9a;
font-size:1.1rem;
margin-bottom:15px;
}

.password-boxes{
display:flex;
justify-content:center;
gap:10px;
}

.password-boxes input{
width:60px;
height:65px;
font-size:30px;
text-align:center;
border:2px solid #ff7fb8;
border-radius:12px;
outline:none;
}

.game-screen{
display:none;
}

.info{
font-size:28px;
font-weight:bold;
color:#ff4f9a;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
flex: 1;
margin-bottom:20px;
}

.card{
height:60px;
border-radius:15px;
background:#ff79b5;
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
cursor:pointer;
user-select:none;
color:transparent;
transition:.3s;
}

.card.show,
.card.matched{
background:#fff0f7;
color:black;
border:2px solid #ff79b5;
}

#emojiChoices{
display:grid;
grid-template-columns:repeat(6,1fr);
justify-content:center;
gap:6px;
width: 100%;
margin-top:10px;
max-width:360px;
margin-left:auto;
margin-right:auto;
flex:0 0 auto;
}

#emojiChoices button{
width:50px;
height:50px;
font-size:24px;
border:none;
border-radius:12px;
background:#ffd9ea;
cursor:pointer;
transition:.2s;
}

#emojiChoices button:hover{
transform:scale(1.1);
}

.game-over,
.win-screen{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
z-index:10;
}

.game-over h2,
.win-screen h2{
color:#ff2f8a;
margin-bottom:15px;
}

.play-btn{
padding:12px 24px;
border:none;
border-radius:14px;
background:#ff5ca8;
color:white;
font-size:18px;
cursor:pointer;
}

.win-link{
display:inline-block;
font-size:28px;
font-weight:bold;
text-decoration:none;
color:#ff2f8a;
margin-bottom:15px;
animation:pulse 1s infinite;
}

.card.matched{
animation:flipWin .5s ease;
}

@keyframes flipWin{
0%{
transform:rotateY(0deg);
}
100%{
transform:rotateY(360deg);
}
}

.shake{
animation:shake .35s;
}

@keyframes shake{
0%,100%{
transform:translateX(0);
}
20%{
transform:translateX(-6px);
}
40%{
transform:translateX(6px);
}
60%{
transform:translateX(-6px);
}
80%{
transform:translateX(6px);
}
}

@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.1);}
}
</style>

</head>

<body>

<audio id="winSound">
<source src="mixkit-fairy-cartoon-success-voice-344.wav" type="audio/wav">
</audio>
<audio id="correctSound">
<source src="mixkit-correct-answer-tone-2870.wav" type="audio/wav">
</audio>
<audio id="wrongSound">
<source src="mixkit-wrong-answer-fail-notification-946.wav" type="audio/wav">
</audio>

<div class="white-box">

<h1>Emoji Memory Game</h1>

<div class="password-screen" id="passwordScreen">

<h2>Enter Password</h2>

<div class="password-boxes">
<input type="password" maxlength="1" class="pass">
<input type="password" maxlength="1" class="pass">
<input type="password" maxlength="1" class="pass">
<input type="password" maxlength="1" class="pass">
</div>

</div>

<div class="game-screen" id="gameScreen">

<div class="info">
⏳ Time: <span id="timer">8</span>s
</div>

<div class="cards" id="cards"></div>

<div class="game-over" id="gameOver">
<h2>Game Over</h2>
<button class="play-btn" onclick="restartGame()">Play Again</button>
</div>

<div class="win-screen" id="winScreen">
<h2>Galing mo!</h2>

<a class="win-link"
href="https://love.tsonit.com/riarosealma"
target="_blank">
💌 Click mo ako
</a>

<br>

<button class="play-btn"
onclick="restartGame()">
Play Again
</button>

</div>

</div>

</div>

<script>

const PASSWORD="0123";

let tickSound;

const emojis=[
"🙄","😆","😏","🤨",
"😒","😉","😂","🤔",
"🤪","😭","☺️","🤗"
];

let selectedEmoji=null;
let timerInterval;
let gameStarted=false;

const inputs=document.querySelectorAll(".pass");

inputs.forEach((input,index)=>{

input.addEventListener("input",()=>{

if(input.value && index<3){
inputs[index+1].focus();
}

const entered=
[...inputs].map(i=>i.value).join("");

if(entered.length===4){

if(entered===PASSWORD){

document.getElementById("passwordScreen").style.display="none";
document.getElementById("gameScreen").style.display="block";

startGame();

}else{

alert("Wrong Password");

inputs.forEach(i=>i.value="");

inputs[0].focus();

}

}

});

});

function startGame(){

    clearInterval(timerInterval);

    selectedEmoji = null;
    gameStarted = false;

    document.getElementById("gameOver").style.display = "none";
    document.getElementById("winScreen").style.display = "none";

    const cards = document.getElementById("cards");
    cards.innerHTML = "";

    const shuffled = [...emojis].sort(()=>Math.random()-0.5);

    shuffled.forEach(emoji => {
        const card = document.createElement("div");
        card.className = "card show";
        card.dataset.answer = emoji;
        card.textContent = emoji;
        card.onclick = () => placeEmoji(card);
        cards.appendChild(card);
    });

    createEmojiChoices();

    let memorize = 8;

    document.getElementById("timer").textContent = memorize;

    const memorizeInterval = setInterval(() => {

        memorize--;

        document.getElementById("timer").textContent = memorize;

        if (memorize <= 0) {

            clearInterval(memorizeInterval);

            document.querySelectorAll(".card").forEach(card => {
                card.classList.remove("show");
                card.textContent = "";
            });

            startTimer();
        }

    }, 1000);
}

function startTimer(){

    gameStarted = true;

    let timeLeft = 30;

    tickSound = new Audio("mixkit-tick-tock-clock-timer-1045.wav");
    tickSound.loop = true;
    tickSound.volume = 0.8;
    tickSound.play();

    document.getElementById("timer").textContent = timeLeft;

    timerInterval = setInterval(() => {

        timeLeft--;

        document.getElementById("timer").textContent = timeLeft;

        if (timeLeft <= 0) {

            if (tickSound) {
                tickSound.pause();
                tickSound.currentTime = 0;
            }

            clearInterval(timerInterval);
            gameOver();
        }

    }, 1000);
}

function createEmojiChoices(){

let old=document.getElementById("emojiChoices");

if(old) old.remove();

const box=document.createElement("div");
box.id="emojiChoices";

emojis.forEach(emoji=>{

const btn=document.createElement("button");

btn.textContent=emoji;
btn.dataset.emoji=emoji;

btn.onclick=()=>{

selectedEmoji=emoji;

document
.querySelectorAll("#emojiChoices button")
.forEach(b=>b.style.transform="scale(1)");

btn.style.transform="scale(1.2)";

};

box.appendChild(btn);

});

document
.getElementById("gameScreen")
.appendChild(box);

}

function placeEmoji(card){

if(!gameStarted) return;

if(card.classList.contains("matched")) return;

if(!selectedEmoji) return;

if(selectedEmoji===card.dataset.answer){

const correctSound=
document.getElementById("correctSound");

correctSound.currentTime=0;
correctSound.play();

card.classList.add("matched");
card.textContent=selectedEmoji;

const btn=
[...document.querySelectorAll("#emojiChoices button")]
.find(b=>b.dataset.emoji===selectedEmoji);

if(btn){
btn.style.visibility="hidden";
}

selectedEmoji=null;

checkWin();

}else{
const wrongSound=
document.getElementById("wrongSound");

wrongSound.currentTime=0;
wrongSound.play();

card.classList.add("shake");

setTimeout(()=>{

card.classList.remove("shake");

},350);

}

}

function checkWin(){

const matched =
document.querySelectorAll(".matched");

if(matched.length===12){

    // 🚨 STOP TIMER SOUND IMMEDIATELY
    if (tickSound) {
        tickSound.pause();
        tickSound.currentTime = 0;
    }

    // stop timer interval
    clearInterval(timerInterval);

    // show win screen
    document.getElementById("winScreen").style.display="block";

    // play win sound ONLY
    const sound = document.getElementById("winSound");

    if(sound){
        sound.currentTime = 0;
        sound.play();
    }
}
}

function gameOver(){

document.querySelectorAll(".card")
.forEach(card=>{

card.classList.add("show");
card.textContent=card.dataset.answer;

});

document.getElementById("gameOver")
.style.display="block";

}

function restartGame(){

    // stop old timer sound first
    if (tickSound) {
        tickSound.pause();
        tickSound.currentTime = 0;
    }

    // restart game
    startGame();
}

</script>

</body>
  </html>
